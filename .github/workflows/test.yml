name: Incident Response Agent CI
run-name: CI · ${{ github.event_name }} · ${{ github.ref_name }}

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-tests:
    name: Offline safety and workflow tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -e '.[dev]'
      - name: Offline tests
        run: .venv/bin/python -m pytest -m 'not integration and not live'

  container-tests:
    name: Disposable container integration tests
    needs: offline-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -e '.[dev]'
      - name: Container failure lab
        env:
          RUN_CONTAINER_TESTS: "1"
        run: .venv/bin/python -m pytest -m 'integration and not live'
