name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -e '.[dev]'
      - name: Offline tests
        run: .venv/bin/python -m pytest -m 'not integration and not live'
      - name: Container failure lab
        env:
          RUN_CONTAINER_TESTS: "1"
        run: .venv/bin/python -m pytest -m 'integration and not live'
